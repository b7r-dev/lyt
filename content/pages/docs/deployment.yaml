# Deployment

meta:
  title: "Deployment"
  slug: "/docs/deployment"
  description: "Deploy your lyt site to any hosting provider"
  agent: true

agent_content:
  title: "Deployment"
  description: "Deploy lyt sites"
  
  sections:
    - type: "default"
      title: "Static Site Hosting"
      body: |
        lyt outputs pure static HTML/CSS. Deploy anywhere:
        
        - Netlify (drag & drop dist folder)
        - Vercel (`vercel --prod`)
        - Cloudflare Pages
        - GitHub Pages
        - Any static host

    - type: "link"
      text: "← Back to Agent Index"
      href: "/agents"

sections:
  - id: "hero"
    type: "hero"
    title: "Deployment"
    subtitle: "lyt"
    body: "Deploy your static site to any hosting provider."

  - id: "overview"
    type: "default"
    title: "How It Works"
    body: |
      lyt outputs pure static files to `./dist/`. Any static host can serve them.
      
      ```bash
      lyt build
      ```
      
      This creates:
      
      ```
      dist/
      ├── index.html
      ├── about.html
      ├── blog/
      │   └── post-name/
      │       └── index.html
      ├── base.css
      ├── tokens.css
      └── sitemap.xml
      ```

  - id: "netlify"
    type: "default"
    title: "Netlify (from GitHub Actions)"
    body: |
      Build on GitHub, deploy to Netlify:
      
      1. Enable GitHub Pages in repo settings → Pages → Source: GitHub Actions
      2. Create `.github/workflows/netlify.yml`:
      
      ```yaml
      name: Deploy to Netlify
      on:
        push:
          branches: [main]
      jobs:
        deploy:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.21'
            
            - name: Build
              run: |
                cd engine
                go run . build
            
            - name: Deploy
              uses: nwtgck/actions-netlify@v2.0
              with:
                publish-dir: './dist'
                production-branch: main
                github-token: ${{ secrets.GITHUB_TOKEN }}
                deploy-message: "Deploy from GitHub Actions"
              env:
                NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
                NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      ```
      
      3. Add `NETLIFY_AUTH_TOKEN` and `NETLIFY_SITE_ID` secrets in GitHub

  - id: "vercel"
    type: "default"
    title: "Vercel (from GitHub Actions)"
    body: |
      Build on GitHub, deploy to Vercel:
      
      1. Create `.github/workflows/vercel.yml`:
      
      ```yaml
      name: Deploy to Vercel
      on:
        push:
          branches: [main]
      jobs:
        deploy:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.21'
            
            - name: Build
              run: |
                cd engine
                go run . build
            
            - name: Deploy
              uses: amondnet/vercel-action@v25
              with:
                vercel-token: ${{ secrets.VERCEL_TOKEN }}
                vercel-org-id: ${{ secrets.ORG_ID }}
                vercel-project-id: ${{ secrets.PROJECT_ID }}
                vercel-args: '--prod'
      ```
      
      2. Add Vercel secrets in GitHub settings

  - id: "cloudflare"
    type: "default"
    title: "Cloudflare Pages (from GitHub Actions)"
    body: |
      Build on GitHub, deploy to Cloudflare:
      
      1. Create `.github/workflows/cloudflare.yml`:
      
      ```yaml
      name: Deploy to Cloudflare
      on:
        push:
          branches: [main]
      jobs:
        deploy:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.21'
            
            - name: Build
              run: |
                cd engine
                go run . build
            
            - name: Deploy
              uses: cloudflare/pages-action@v1
              with:
                apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                projectName: your-project
                directory: dist
      ```
      
      2. Add Cloudflare secrets in GitHub settings

  - id: "github-pages"
    type: "default"
    title: "GitHub Pages"
    body: |
      Create `.github/workflows/deploy.yml`:
      
      ```yaml
      name: Deploy
      
      on:
        push:
          branches: [main]
      
      jobs:
        deploy:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.21'
            
            - name: Build
              run: |
                go build -o lyt .
                ./lyt build
            
            - name: Deploy
              uses: peaceiris/actions-gh-pages@v3
              with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: ./dist
      ```

  - id: "break-vps"
    type: "divider"
    icon: "→"

  - id: "vps"
    type: "default"
    title: "VPS / rsync"
    body: |
      ## Deploy to VPS
      
      Build locally or in CI, then rsync:
      
      ```bash
      cd engine && go run . build
      rsync -avz --delete dist/ user@vps:/var/www/yoursite/
      ```
      
      Or use SSH in CI:
      
      ```yaml
      - name: Deploy
        run: |
          rsync -avz --delete dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/site/
      ```

  - id: "cdn"
    type: "default"
    title: "CDN / Storage"
    body: |
      ## Object Storage + CDN
      
      Upload `dist/` to S3/Cloudflare R2/Backblaze, then connect CDN.
      
      **AWS S3 example:**
      
      ```bash
      aws s3 sync dist/ s3://your-bucket --delete
      ```
      
      Then configure your CDN to point to the bucket.

  - id: "environment"
    type: "default"
    title: "Environment Variables"
    body: |
      For per-environment config (e.g., different URLs), use shell variables:
      
      ```bash
      # In your CI
      export SITE_URL="https://staging.example.com"
      cd engine && go run . build
      ```
      
      Reference in templates via build-time substitution if needed.

  - id: "validation"
    type: "default"
    title: "Validating Content"
    body: |
      Use schema validation to catch content errors before deployment:

      ```bash
      lyt validate          # Check content files
      lyt build --validate # Build with validation
      ```

      **In CI/CD:**

      ```yaml
      - name: Build and Validate
        run: |
          go build -o lyt .
          ./lyt build --validate
      ```

  - id: "next"
    type: "cta"
    title: "Need Help?"
    body: "Questions? Check the docs or open an issue on GitHub."
    button_text: "View on GitHub"
    button_href: "https://github.com/b7r-dev/lyt"
